<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiAgent 智能助手</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">

    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/c.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/csharp.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/php.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/shell.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/xml.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/swift.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/kotlin.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/ruby.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/languages/plaintext.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 280px; background: #fafafa; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; transition: all 0.3s ease; overflow: hidden; }
        .sidebar.collapsed { width: 0; border-right: none; }
        .sidebar.collapsed .sidebar-header,
        .sidebar.collapsed .history-section,
        .sidebar.collapsed .sidebar-footer { display: none; }
        .sidebar-header { padding: 12px 16px 16px; }
        .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding: 4px 0; }
        .sidebar-logo .logo-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .sidebar-logo .logo-text { font-size: 1.05rem; font-weight: 600; color: #333; }
        .search-box { position: relative; margin-bottom: 12px; }
        .search-box input { width: 100%; padding: 9px 12px 9px 34px; border: 1px solid #e8e8e8; border-radius: 10px; font-size: 0.85rem; outline: none; background: #fff; transition: all 0.2s; color: #333; }
        .search-box input::placeholder { color: #bbb; }
        .search-box input:focus { border-color: #d0d0d0; background: #fff; }
        .search-box .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; display: flex; align-items: center; }
        .search-box .search-icon svg { width: 16px; height: 16px; fill: #bbb; }
        .new-chat-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 11px 16px; border: 1px dashed #d9d9d9; border-radius: 12px; background: #fff; cursor: pointer; font-size: 0.9rem; color: #555; transition: all 0.2s; }
        .new-chat-btn:hover { border-color: #667eea; color: #667eea; background: #f5f3ff; }
        .new-chat-btn .btn-icon { font-size: 1.1rem; line-height: 1; font-weight: 300; }

        .history-section { flex: 1; overflow-y: auto; padding: 4px 8px; }
        .history-section::-webkit-scrollbar { width: 4px; }
        .history-section::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }
        .history-label { font-size: 0.72rem; color: #aaa; padding: 12px 8px 6px; font-weight: 500; letter-spacing: 0.5px; }
        .history-item { display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: all 0.15s; position: relative; margin-bottom: 2px; }
        .history-item:hover { background: #f0f0f0; }
        .history-item.active { background: #e8e6ff; }
        .history-item.active .item-text { color: #667eea; }
        .history-item .item-icon { font-size: 0.85rem; flex-shrink: 0; opacity: 0.5; }
        .history-item.active .item-icon { opacity: 0.8; }
        .history-item .item-text { flex: 1; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #444; }
        .history-item .item-delete { opacity: 0; font-size: 0.75rem; color: #bbb; cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: all 0.15s; }
        .history-item:hover .item-delete { opacity: 1; }
        .history-item .item-delete:hover { color: #f44336; background: #fff1f0; }

        .sidebar-footer { padding: 12px 16px; border-top: 1px solid #e8e8e8; display: flex; align-items: center; gap: 10px; }
        .sidebar-footer .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; }
        .sidebar-footer .user-name { font-size: 0.85rem; color: #333; }

        .main-area { flex: 1; display: flex; flex-direction: column; height: 100vh; background: #fff; }
        .chat-header { padding: 12px 24px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .sidebar-toggle-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border: none; border-radius: 6px; background: transparent; cursor: pointer; color: #666; transition: all 0.2s; }
        .sidebar-toggle-btn:hover { background: #f0f0f0; color: #333; }
        .sidebar-toggle-btn svg { width: 20px; height: 20px; }
        .chat-header h2 { font-size: 1rem; color: #333; font-weight: 500; margin: 0; }
        .chat-header-actions { display: flex; gap: 8px; }
        .chat-header-actions button { padding: 6px 12px; border: 1px solid #e8e8e8; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.8rem; color: #666; transition: all 0.2s; }
        .chat-header-actions button:hover { border-color: #667eea; color: #667eea; }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px 24px; background: #fafafa; }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 3px; }
        .message { margin-bottom: 16px; padding: 14px 18px; border-radius: 12px; max-width: 85%; line-height: 1.6; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin-left: auto; border-bottom-right-radius: 4px; display: block; max-width: 70%; width: fit-content; }
        .assistant { background: #ffffff; color: #333; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
        .message-time { font-size: 0.75rem; color: #999; margin-top: 6px; }
        .message-content { word-break: break-word; }
        .message-content h1, .message-content h2, .message-content h3, .message-content h4, .message-content h5, .message-content h6 { margin: 16px 0 8px; font-weight: 600; line-height: 1.4; }
        .message-content h1 { font-size: 1.3rem; }
        .message-content h2 { font-size: 1.15rem; }
        .message-content h3 { font-size: 1.05rem; }
        .message-content p { margin: 8px 0; }
        .message-content ul, .message-content ol { margin: 8px 0; padding-left: 24px; }
        .message-content li { margin: 4px 0; }
        .message-content strong { font-weight: 600; }
        .message-content code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
        .message-content pre { background: #f6f8fa; border: 1px solid #e8e8e8; border-radius: 8px; margin: 12px 0; overflow: hidden; }
        .message-content pre code { background: none; padding: 12px 16px; border-radius: 0; display: block; overflow-x: auto; font-size: 0.88rem; line-height: 1.6; }
        .code-block-wrapper { margin: 12px 0; border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; background: #fafafa; }
        .code-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; background: #f0f0f0; border-bottom: 1px solid #e8e8e8; font-size: 0.82rem; color: #666; user-select: none; }
        .code-header .code-lang { font-weight: 500; display: flex; align-items: center; gap: 4px; }
        .code-header .code-lang::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #667eea; }
        .code-header .code-actions { display: flex; gap: 6px; }
        .code-header .code-action-btn { cursor: pointer; color: #999; transition: color 0.2s; background: none; border: none; font-size: 0.82rem; display: flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 4px; }
        .code-header .code-action-btn:hover { color: #667eea; background: rgba(102,126,234,0.08); }
        .code-block-wrapper pre { margin: 0; border: none; border-radius: 0; }
        .code-block-wrapper pre code { padding: 14px 16px; }
        .message-content blockquote { border-left: 3px solid #667eea; padding: 8px 16px; margin: 8px 0; background: #f8f8ff; border-radius: 0 4px 4px 0; color: #555; }
        .message-content table { border-collapse: collapse; width: 100%; margin: 8px 0; }
        .message-content table th, .message-content table td { border: 1px solid #e0e0e0; padding: 8px 12px; text-align: left; }
        .message-content table th { background: #f5f5f5; font-weight: 600; }
        .message-content hr { border: none; border-top: 1px solid #e0e0e0; margin: 16px 0; }
        .message-content a { color: #667eea; text-decoration: none; }
        .message-content a:hover { text-decoration: underline; }

        /* Document preview card */
        .document-preview-card { border: 1px solid #e8e8e8; border-radius: 12px; margin: 12px 0; overflow: hidden; background: #fff; }
        .document-preview-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #fafafa; border-bottom: 1px solid #e8e8e8; }
        .document-preview-header .doc-info { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #666; }
        .document-preview-header .doc-info .doc-icon { font-size: 1.1rem; }
        .document-preview-header .doc-actions { display: flex; gap: 6px; }
        .document-preview-header .doc-action-btn { display: flex; align-items: center; gap: 4px; padding: 4px 10px; border: 1px solid #e0e0e0; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.8rem; color: #666; transition: all 0.2s; }
        .document-preview-header .doc-action-btn:hover { border-color: #667eea; color: #667eea; background: #f5f3ff; }
        .document-preview-header .doc-action-btn svg { width: 14px; height: 14px; fill: currentColor; }
        .document-preview-body { padding: 16px; max-height: 400px; overflow-y: auto; font-size: 0.92rem; line-height: 1.7; color: #333; white-space: pre-wrap; word-break: break-word; }
        .document-preview-body::-webkit-scrollbar { width: 4px; }
        .document-preview-body::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 2px; }
        .document-preview-footer { padding: 8px 16px; border-top: 1px solid #e8e8e8; background: #fafafa; }
        .document-preview-footer a { color: #667eea; text-decoration: none; font-size: 0.85rem; }
        .document-preview-footer a:hover { text-decoration: underline; }

        .examples { padding: 0 24px 15px; background: #fafafa; }
        .examples h3 { font-size: 0.85rem; color: #666; margin-bottom: 12px; }
        .example-tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { padding: 8px 16px; background: #f0f0f0; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .tag:hover { background: #667eea; color: white; transform: translateY(-2px); }

        .loading-dots { display: flex; gap: 4px; }
        .loading-dots span { width: 8px; height: 8px; background: white; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .thinking-indicator { display: flex; align-items: center; gap: 8px; color: #667eea; }
        .thinking-icon { width: 20px; height: 20px; border: 2px solid #667eea; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .typing-cursor::after { content: '|'; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .input-wrapper { padding: 15px 24px 20px; background: white; border-top: 1px solid #eee; }
        .input-box { display: flex; flex-direction: column; gap: 6px; padding: 10px 16px 10px; border: 2px solid #e0e0e0; border-radius: 24px; transition: all 0.3s; background: #fafafa; position: relative; }
        .input-box:focus-within { border-color: #667eea; background: white; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .input-row { display: flex; align-items: center; gap: 10px; }
        .skill-tag { display: none; align-items: center; gap: 4px; padding: 4px 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 12px; font-size: 0.85rem; white-space: nowrap; }
        .skill-tag.show { display: flex; }
        .skill-tag.skill-document { background: linear-gradient(135deg, #4facfe, #005bea); }
        .skill-tag.skill-code { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .skill-tag.skill-drawing { background: linear-gradient(135deg, #f5af19, #f12711); }
        .skill-tag .remove { cursor: pointer; margin-left: 4px; opacity: 0.8; }
        .skill-tag .remove:hover { opacity: 1; }
        .file-tag-inline { display: none; align-items: center; gap: 6px; padding: 6px 10px; background: #f0f0f0; border-radius: 8px; font-size: 0.85rem; white-space: nowrap; max-width: 150px; }
        .file-tag-inline.show { display: flex; }
        .file-tag-inline .file-icon { font-size: 1rem; }
        .file-tag-inline .file-info { display: flex; flex-direction: column; overflow: hidden; }
        .file-tag-inline .file-name { font-size: 0.8rem; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-tag-inline .file-size { font-size: 0.7rem; color: #999; }
        .file-tag-inline .remove { cursor: pointer; color: #999; margin-left: 4px; }
        .file-tag-inline .remove:hover { color: #f44336; }
        .input-row input { flex: 1; border: none; background: transparent; font-size: 1rem; outline: none; padding: 4px 0; }
        .input-row input::placeholder { color: #999; }
        .send-btn { width: 40px; height: 40px; border: none; border-radius: 50%; background: #1677ff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: white; flex-shrink: 0; }
        .send-btn:hover { background: #4096ff; box-shadow: 0 4px 12px rgba(22,119,255,0.3); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .send-btn svg { width: 20px; height: 20px; fill: white; }
        .toolbar-row { display: flex; align-items: center; gap: 8px; padding-top: 6px; border-top: 1px solid #eee; }
        .toolbar-btn { padding: 4px 10px; border: none; border-radius: 12px; background: transparent; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 4px; transition: all 0.2s; color: #666; }
        .toolbar-btn:hover { background: #f0f0f0; color: #667eea; }
        .toolbar-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .popup-panel { display: none; position: absolute; bottom: 100%; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); padding: 8px; z-index: 100; margin-bottom: 8px; }
        .popup-panel.show { display: block; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .skill-item { padding: 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
        .skill-item:hover { background: #f0f0f0; }
        .skill-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; flex-shrink: 0; }
        .skill-icon[data-skill="document"] { background: linear-gradient(135deg, #4facfe, #005bea); }
        .skill-icon[data-skill="code"] { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .skill-icon[data-skill="drawing"] { background: linear-gradient(135deg, #f5af19, #f12711); }
        .skill-info h4 { font-size: 0.9rem; color: #333; margin-bottom: 2px; }
        .skill-info p { font-size: 0.8rem; color: #666; }

        .message-actions { display: flex; gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
        .action-btn { width: 28px; height: 28px; border: none; border-radius: 6px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: #999; font-size: 0.95rem; }
        .action-btn:hover { background: #f0f0f0; color: #667eea; }
        .action-btn.active { color: #667eea; background: #eef0ff; }
        .action-btn svg { width: 16px; height: 16px; fill: currentColor; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 24px; border-radius: 8px; font-size: 0.9rem; z-index: 9999; animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

        .empty-chat { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #999; }
        .empty-chat .empty-icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-chat p { font-size: 0.95rem; }

    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div class="logo-icon">✨</div>
                <span class="logo-text">小智</span>
            </div>
            <div class="search-box">
                <span class="search-icon"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
                <input type="text" placeholder="搜索对话..." id="searchInput" oninput="filterHistory()">
            </div>
            <button class="new-chat-btn" onclick="createNewChat()">
                <span class="btn-icon">✏️</span>
                新建对话
            </button>
        </div>

        <div class="history-section" id="historySection">
            <div class="history-label">历史对话</div>
        </div>

        <div class="sidebar-footer">
            <div class="avatar">👤</div>
            <span class="user-name">用户</span>
        </div>
    </div>

    <div class="main-area">
        <div class="chat-header">
            <div class="chat-header-left">
                <button class="sidebar-toggle-btn" id="sidebarToggleBtn" onclick="toggleSidebar()" title="切换侧边栏">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                        <circle cx="6" cy="8" r="1" fill="currentColor" stroke="none"/>
                        <circle cx="6" cy="12" r="1" fill="currentColor" stroke="none"/>
                        <circle cx="6" cy="16" r="1" fill="currentColor" stroke="none"/>
                    </svg>
                </button>
                <h2 id="chatTitle">新对话</h2>
            </div>
            <div class="chat-header-actions">
                <button onclick="clearCurrentChat()" title="清空当前对话">️ 清空</button>
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="empty-chat" id="emptyChat">
                <div class="empty-icon"></div>
                <p>有什么我能帮你的吗</p>
            </div>
        </div>
        <div class="examples" id="examplesSection">
            <h3>💡 示例问题（点击即可发送）：</h3>
            <div class="example-tags">
                <span class="tag" onclick="sendExample('帮我规划一个北京三日游的路线')">🏙️ 北京三日游</span>
                <span class="tag" onclick="sendExample('给我讲一个程序员笑话')">😂 程序员笑话</span>
                <span class="tag" onclick="sendExample('帮我对个对联，上联：春回大地')">📝 对联：春回大地</span>
            </div>
        </div>
        <div class="input-wrapper">
            <div class="input-box">
                <div class="popup-panel" id="skillPanel">
                    <div class="skill-item" onclick="selectSkill('document')">
                        <div class="skill-icon" data-skill="document">📄</div>
                        <div class="skill-info">
                            <h4>文档处理</h4>
                            <p>帮你创建、修改、排版和优化文档</p>
                        </div>
                    </div>
                    <div class="skill-item" onclick="selectSkill('code')">
                        <div class="skill-icon" data-skill="code">💻</div>
                        <div class="skill-info">
                            <h4>编程</h4>
                            <p>帮你编写代码，修改上传的代码文件</p>
                        </div>
                    </div>
                    <div class="skill-item" onclick="selectSkill('drawing')">
                        <div class="skill-icon" data-skill="drawing">📐</div>
                        <div class="skill-info">
                            <h4>图纸识别</h4>
                            <p>识别工程图纸，提取尺寸、公差、国标校核</p>
                        </div>
                    </div>
                </div>
                <div class="input-row">
                    <div class="file-tag-inline" id="fileTagInline">
                        <span class="file-icon" id="fileTagIcon"></span>
                        <div class="file-info">
                            <span class="file-name" id="fileTagName"></span>
                            <span class="file-size" id="fileTagSize"></span>
                        </div>
                        <span class="remove" onclick="removeFileTag()">✕</span>
                    </div>
                    <div class="skill-tag" id="skillTag">
                        <span id="skillTagIcon"></span>
                        <span id="skillTagName"></span>
                        <span class="remove" onclick="removeSkill()">✕</span>
                    </div>
                    <input type="text" id="messageInput" placeholder="输入问题或任务，/ 选择技能" onkeypress="handleKeyPress(event)">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送"><svg viewBox="0 0 24 24"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg></button>
                </div>
                <div class="toolbar-row">
                    <button class="toolbar-btn" id="uploadFileBtn" disabled onclick="document.getElementById('fileInput').click()">➕ 上传文件</button>
                    <button class="toolbar-btn" onclick="toggleSkillPanel()">🛠️ 技能</button>
                </div>
            </div>
        </div>
        <input type="file" id="fileInput" style="display:none;" accept=".docx,.doc,.txt,.ppt,.pptx,.xlsx,.xls" onchange="handleFileSelect(event)">
    </div>

    <script>
        let conversations = JSON.parse(localStorage.getItem('conversations') || '[]');
        let currentConvId = null;
        let uploadedFiles = [];
        let currentSkill = null;
        let uploadedFilePath = null;

        // 初始化：上传文件按钮默认禁用
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('uploadFileBtn').disabled = true;
        });

        function getTime() {
            return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function saveConversations() {
            localStorage.setItem('conversations', JSON.stringify(conversations));
        }

        function createNewChat() {
            const conv = {
                id: generateId(),
                title: '新对话',
                threadId: Math.floor(Math.random() * 100000),
                messages: [],
                createdAt: new Date().toISOString()
            };
            conversations.unshift(conv);
            saveConversations();
            switchConversation(conv.id);
            renderHistory();
            document.getElementById('uploadFileBtn').disabled = true;
        }

        function switchConversation(convId) {
            currentConvId = convId;
            const conv = conversations.find(c => c.id === convId);
            if (!conv) return;

            document.getElementById('chatTitle').textContent = conv.title;
            renderMessages(conv.messages);
            renderHistory();
            document.getElementById('uploadFileBtn').disabled = true;
        }

        function deleteConversation(convId, event) {
            event.stopPropagation();
            conversations = conversations.filter(c => c.id !== convId);
            saveConversations();
            if (currentConvId === convId) {
                if (conversations.length > 0) {
                    switchConversation(conversations[0].id);
                } else {
                    createNewChat();
                }
            }
            renderHistory();
        }

        function renderHistory() {
            const section = document.getElementById('historySection');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let html = '<div class="history-label">历史对话</div>';
            const filtered = conversations.filter(c =>
                c.title.toLowerCase().includes(searchTerm) ||
                c.messages.some(m => m.content.toLowerCase().includes(searchTerm))
            );

            filtered.forEach(conv => {
                const isActive = conv.id === currentConvId;
                const iconSvg = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;opacity:0.5"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>`;
                html += `
                    <div class="history-item ${isActive ? 'active' : ''}" onclick="switchConversation('${conv.id}')">
                        <span class="item-icon">${iconSvg}</span>
                        <span class="item-text">${escapeHtml(conv.title)}</span>
                        <span class="item-delete" onclick="deleteConversation('${conv.id}', event)" title="删除">✕</span>
                    </div>`;
            });

            if (filtered.length === 0) {
                html += '<div style="text-align:center;padding:20px;color:#999;font-size:0.85rem;">暂无对话</div>';
            }

            section.innerHTML = html;
        }

        function filterHistory() {
            renderHistory();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            if (typeof marked === 'undefined' || typeof hljs === 'undefined') {
                return escapeHtml(text).replace(/\n/g, '<br>');
            }

            // Pre-process: fix inline code blocks where backticks and code are on the same line
            // Pattern: ```lang code``` all on one line → convert to proper multi-line
            text = text.replace(/```(\w*)\s*([\s\S]*?)```/g, function(match, lang, code) {
                const trimmedCode = code.trim();
                return '\n\n```' + (lang || '') + '\n' + trimmedCode + '\n```\n\n';
            });

            // Extract document preview blocks BEFORE markdown processing
            const docPreviews = [];
            text = text.replace(/<document-preview filename="([^"]+)" download-url="([^"]+)">([\s\S]*?)<\/document-preview>/g, function(match, filename, downloadUrl, content) {
                docPreviews.push({ filename, downloadUrl, content });
                // Use null-byte delimited marker that won't be processed by markdown
                return '\u0000\u0000DOC_PREVIEW_' + (docPreviews.length - 1) + '\u0000\u0000';
            });

            marked.setOptions({
                breaks: true,
                gfm: true,
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
                    }
                    try { return hljs.highlightAuto(code).value; } catch(e) {}
                    return escapeHtml(code);
                }
            });

            let html = marked.parse(text);

            // Restore document preview cards after markdown processing
            docPreviews.forEach((doc, index) => {
                const ext = doc.filename.split('.').pop().toLowerCase();
                const icons = { docx: '📝', doc: '📝', txt: '📄', xlsx: '📊', xls: '', pptx: '📽️', ppt: '📽️' };
                const icon = icons[ext] || '📄';
                const escapedContent = escapeHtml(doc.content);
                const cardHTML = `<div class="document-preview-card">
                    <div class="document-preview-header">
                        <div class="doc-info"><span class="doc-icon">${icon}</span><span>${escapeHtml(doc.filename)}</span></div>
                        <div class="doc-actions">
                            <button class="doc-action-btn" onclick="copyDocContent(this)" title="复制内容">
                                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                                复制
                            </button>
                            <a class="doc-action-btn" href="${doc.downloadUrl}" download="${doc.filename}" title="下载">
                                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                                下载
                            </a>
                        </div>
                    </div>
                    <div class="document-preview-body">${escapedContent}</div>
                </div>`;
                html = html.replace('\u0000\u0000DOC_PREVIEW_' + index + '\u0000\u0000', cardHTML);
            });

            // Process code blocks: add header with lang name and action buttons
            html = html.replace(/<pre><code class="language-(\w+)">([\s\S]*?)<\/code><\/pre>/g, function(match, lang, code) {
                const langName = lang || 'code';
                return `<div class="code-block-wrapper"><div class="code-header"><span class="code-lang">${langName}</span><div class="code-actions"><button class="code-action-btn" onclick="copyCodeBlock(this)" title="复制代码"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button><button class="code-action-btn" onclick="expandCodeBlock(this)" title="展开/折叠"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M7 10l5 5 5-5z"/></svg></button></div></div><pre><code class="language-${lang}">${code}</code></pre></div>`;
            });

            // Also handle code blocks without language class
            html = html.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, function(match, code) {
                return `<div class="code-block-wrapper"><div class="code-header"><span class="code-lang">code</span><div class="code-actions"><button class="code-action-btn" onclick="copyCodeBlock(this)" title="复制代码"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button><button class="code-action-btn" onclick="expandCodeBlock(this)" title="展开/折叠"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M7 10l5 5 5-5z"/></svg></button></div></div><pre><code>${code}</code></pre></div>`;
            });

            return html;
        }

        function copyCodeBlock(btn) {
            const wrapper = btn.closest('.code-block-wrapper');
            const codeBlock = wrapper.querySelector('code');
            const text = codeBlock.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const origHTML = btn.innerHTML;
                btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> 已复制';
                setTimeout(() => { btn.innerHTML = origHTML; }, 2000);
            });
        }

        function copyDocContent(btn) {
            const card = btn.closest('.document-preview-card');
            const body = card.querySelector('.document-preview-body');
            const text = body.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const origHTML = btn.innerHTML;
                btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> 已复制';
                setTimeout(() => { btn.innerHTML = origHTML; }, 2000);
            });
        }

        function expandCodeBlock(btn) {
            const wrapper = btn.closest('.code-block-wrapper');
            const pre = wrapper.querySelector('pre');
            if (pre.style.maxHeight) {
                pre.style.maxHeight = '';
                pre.style.overflow = '';
                btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M7 10l5 5 5-5z"/></svg>';
            } else {
                pre.style.maxHeight = '300px';
                pre.style.overflow = 'auto';
                btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M7 14l5-5 5 5z"/></svg>';
            }
        }

        function renderMessages(messages) {
            const chatArea = document.getElementById('chatArea');
            const emptyChat = document.getElementById('emptyChat');
            const examplesSection = document.getElementById('examplesSection');

            if (messages.length === 0) {
                chatArea.innerHTML = '';
                chatArea.appendChild(createEmptyState());
                examplesSection.style.display = 'block';
                return;
            }

            examplesSection.style.display = 'none';
            chatArea.innerHTML = '';

            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.role}`;
                let displayContent;
                if (msg.role === 'assistant') {
                    displayContent = renderMarkdown(msg.content);
                } else {
                    displayContent = escapeHtml(msg.content).replace(/\n/g, '<br>');
                }

                let actionsHTML = '';
                if (msg.role === 'assistant') {
                    actionsHTML = `
                        <div class="message-actions">
                            <button class="action-btn" title="赞" onclick="handleLike(this)">
                                <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
                            </button>
                            <button class="action-btn" title="踩" onclick="handleDislike(this)">
                                <svg viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
                            </button>
                            <button class="action-btn" title="复制" onclick="handleCopy(this)">
                                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            </button>
                            <button class="action-btn" title="重试" onclick="handleRetry(this)">
                                <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                            </button>
                        </div>`;
                }

                msgDiv.innerHTML = `<div class="message-content">${displayContent}</div><div class="message-time">${msg.time || ''}</div>${actionsHTML}`;
                chatArea.appendChild(msgDiv);
            });

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function createEmptyState() {
            const div = document.createElement('div');
            div.className = 'empty-chat';
            div.id = 'emptyChat';
            div.innerHTML = '<div class="empty-icon">💬</div><p>有什么我能帮你的吗？</p>';
            return div;
        }

        function getCurrentConv() {
            return conversations.find(c => c.id === currentConvId);
        }

        function addMessageToConv(role, content, time) {
            const conv = getCurrentConv();
            if (!conv) return;
            conv.messages.push({ role, content, time: time || getTime() });

            if (role === 'user' && conv.messages.filter(m => m.role === 'user').length === 1) {
                conv.title = content.substring(0, 20) + (content.length > 20 ? '...' : '');
                document.getElementById('chatTitle').textContent = conv.title;
            }

            saveConversations();
            renderHistory();
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '上传失败');
                }
                return await response.json();
            } catch (error) {
                console.error('文件上传失败:', error);
                throw error;
            }
        }

        async function readTextFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);
                reader.readAsText(file);
            });
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message && uploadedFiles.length === 0) return;

            const conv = getCurrentConv();
            if (!conv) {
                createNewChat();
            }

            const examplesSection = document.getElementById('examplesSection');
            examplesSection.style.display = 'none';

            const emptyChat = document.getElementById('emptyChat');
            if (emptyChat) emptyChat.remove();

            addMessageToConv('user', message);
            renderMessages(getCurrentConv().messages);

            input.value = '';
            setLoading(true);

            const thinkingMsg = document.createElement('div');
            thinkingMsg.className = 'message assistant';
            thinkingMsg.innerHTML = `<div class="thinking-indicator"><span class="thinking-icon"></span><span>正在分析您的问题...</span></div><div class="message-time">${getTime()}</div>`;
            document.getElementById('chatArea').appendChild(thinkingMsg);
            document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;

            try {
                let fileContent = null;
                let fileName = null;

                if (uploadedFiles.length > 0) {
                    const file = uploadedFiles[0];
                    fileName = file.name;
                    const uploadResult = await uploadFile(file);
                    uploadedFilePath = uploadResult.file_path;
                    fileName = uploadResult.filename;
                    const ext = file.name.split('.').pop().toLowerCase();
                    if (ext === 'txt') {
                        fileContent = await readTextFile(file);
                    }
                }

                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        thread_id: conv.threadId,
                        file_content: fileContent,
                        file_name: fileName,
                        skill: currentSkill,
                        history: conv.messages.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content }))
                    })
                });

                if (!response.ok) throw new Error('网络请求失败');

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let latestResponse = '';
                let state = 'thinking';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const text = JSON.parse(line.substring(6));
                            latestResponse = text;
                            const renderedResponse = latestResponse.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color: #667eea; text-decoration: underline; cursor: pointer;">$1</a>');
                            if (state === 'thinking') {
                                thinkingMsg.innerHTML = `<div class="message-content">${renderedResponse}<span class="typing-cursor"></span></div><div class="message-time">${getTime()}</div>`;
                                state = 'responding';
                            } else {
                                const contentDiv = thinkingMsg.querySelector('.message-content');
                                contentDiv.innerHTML = renderedResponse + '<span class="typing-cursor"></span>';
                            }
                        } catch (e) {}
                    }
                    document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                }

                if (state !== 'thinking') {
                    const contentDiv = thinkingMsg.querySelector('.message-content');
                    const renderedResponse = renderMarkdown(latestResponse);
                    contentDiv.innerHTML = renderedResponse || '暂无响应';

                    const actionsHTML = `
                        <div class="message-actions">
                            <button class="action-btn" title="赞" onclick="handleLike(this)">
                                <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
                            </button>
                            <button class="action-btn" title="踩" onclick="handleDislike(this)">
                                <svg viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
                            </button>
                            <button class="action-btn" title="复制" onclick="handleCopy(this)">
                                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            </button>
                            <button class="action-btn" title="重试" onclick="handleRetry(this)">
                                <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                            </button>
                        </div>`;
                    thinkingMsg.insertAdjacentHTML('beforeend', actionsHTML);

                    addMessageToConv('assistant', latestResponse || '暂无响应');
                } else {
                    thinkingMsg.innerHTML = `<div class="message-content">⚠️ 抱歉，服务响应超时</div><div class="message-time">${getTime()}</div>`;
                }
            } catch (error) {
                thinkingMsg.innerHTML = `<div class="message-content">⚠️ 抱歉，服务出现错误: ${error.message}</div><div class="message-time">${getTime()}</div>`;
            } finally {
                setLoading(false);
                removeFileTag();
            }
        }

        function sendExample(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function setLoading(loading) {
            document.getElementById('sendBtn').disabled = loading;
            document.getElementById('sendBtn').innerHTML = loading
                ? '<div class="loading-dots"><span></span><span></span><span></span></div>'
                : '<svg viewBox="0 0 24 24"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg>';
        }

        function toggleSkillPanel() {
            document.getElementById('skillPanel').classList.toggle('show');
        }

        function closeAllPanels() {
            document.getElementById('skillPanel').classList.remove('show');
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.toolbar-btn') && !e.target.closest('.popup-panel')) {
                closeAllPanels();
            }
        });

        function selectSkill(skillType) {
            currentSkill = skillType;
            closeAllPanels();
            const skillTag = document.getElementById('skillTag');
            const skillTagIcon = document.getElementById('skillTagIcon');
            const skillTagName = document.getElementById('skillTagName');
            const messageInput = document.getElementById('messageInput');

            if (skillType === 'document') {
                skillTagIcon.textContent = '📄';
                skillTagName.textContent = '文档';
                messageInput.placeholder = '请描述您想如何新建或修改文档...';
            } else if (skillType === 'code') {
                skillTagIcon.textContent = '💻';
                skillTagName.textContent = '编程';
                messageInput.placeholder = '请描述您想编写或修改的代码...';
            } else if (skillType === 'drawing') {
                skillTagIcon.textContent = '📐';
                skillTagName.textContent = '图纸识别';
                messageInput.placeholder = '请描述图纸分析需求，如：提取尺寸、校核公差...';
            }

            skillTag.className = 'skill-tag show skill-' + skillType;
            messageInput.focus();
            document.getElementById('uploadFileBtn').disabled = false;

            // 根据技能类型动态设置文件上传格式
            const fileInput = document.getElementById('fileInput');
            if (skillType === 'drawing') {
                fileInput.setAttribute('accept', '.png,.jpg,.jpeg,.bmp,.tiff,.tif,.pdf,.dxf');
            } else {
                fileInput.setAttribute('accept', '.docx,.doc,.txt,.ppt,.pptx,.xlsx,.xls');
            }
        }

        function removeSkill() {
            currentSkill = null;
            const skillTag = document.getElementById('skillTag');
            skillTag.className = 'skill-tag';
            document.getElementById('messageInput').placeholder = '输入问题或任务，/ 选择技能';
            document.getElementById('uploadFileBtn').disabled = true;
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = { docx: '📝', doc: '📝', txt: '📄', ppt: '', pptx: '📊', xlsx: '📈', xls: '📈',
                            png: '', jpg: '', jpeg: '', bmp: '', tiff: '', tif: '', pdf: '📕', dxf: '📐' };
            return icons[ext] || '';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function showFileTag(file) {
            document.getElementById('fileTagIcon').textContent = getFileIcon(file.name);
            document.getElementById('fileTagName').textContent = file.name;
            document.getElementById('fileTagSize').textContent = formatFileSize(file.size);
            document.getElementById('fileTagInline').classList.add('show');
        }

        function removeFileTag() {
            document.getElementById('fileTagInline').classList.remove('show');
            uploadedFiles = [];
            uploadedFilePath = null;
        }

        function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            if (files.length > 0) {
                const file = files[0];
                // const ext = file.name.split('.').pop().toLowerCase();
                // const allowedExts = ['docx', 'doc', 'txt', 'ppt', 'pptx', 'xlsx', 'xls'];
                // if (!allowedExts.includes(ext)) {
                //     alert(`不支持的文件格式，支持的格式: ${allowedExts.join(', ')}`);
                //     return;
                // }
                showFileTag(file);
                uploadedFiles = [file];
            }
            event.target.value = '';
        }

        function clearCurrentChat() {
            const conv = getCurrentConv();
            if (!conv) return;
            if (conv.messages.length === 0) return;
            if (!confirm('确定要清空当前对话吗？')) return;
            conv.messages = [];
            conv.title = '新对话';
            document.getElementById('chatTitle').textContent = '新对话';
            saveConversations();
            renderMessages([]);
            renderHistory();
        }

        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function handleLike(btn) {
            btn.closest('.message-actions').querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showToast('👍 感谢您的反馈！');
        }

        function handleDislike(btn) {
            btn.closest('.message-actions').querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showToast('👎 收到您的反馈，我们会改进！');
        }

        function handleCopy(btn) {
            const msgDiv = btn.closest('.message');
            const text = msgDiv.querySelector('.message-content').innerText;
            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('active');
                showToast('✅ 已复制到剪贴板');
                setTimeout(() => btn.classList.remove('active'), 1500);
            }).catch(() => showToast('❌ 复制失败，请手动复制'));
        }

        function handleRetry(btn) {
            const msgDiv = btn.closest('.message');
            const prevMsg = msgDiv.previousElementSibling;
            if (prevMsg && prevMsg.classList.contains('user')) {
                const userText = prevMsg.querySelector('.message-content').innerText;
                const conv = getCurrentConv();
                const userIdx = conv.messages.findIndex(m => m.role === 'user' && m.content === userText);
                if (userIdx !== -1) {
                    conv.messages.splice(userIdx + 1);
                    saveConversations();
                }
                msgDiv.remove();
                prevMsg.remove();
                document.getElementById('messageInput').value = userText;
                sendMessage();
            } else {
                showToast('️ 找不到对应的用户消息');
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        // 初始化
        if (conversations.length === 0) {
            createNewChat();
        } else {
            switchConversation(conversations[0].id);
        }
        renderHistory();
    </script>
</body>
</html>
