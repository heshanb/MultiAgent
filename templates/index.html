        });
        
            // ==================== 认证功能 ====================
        let currentUser = null;
        
        async function checkAuthStatus() {
            console.log('=== 检查认证状态 ===');
            
            // 重新从 localStorage 读取 token，确保获取最新值
            const storedToken = localStorage.getItem('authToken');
            console.log('localStorage 中的 authToken:', storedToken ? '存在 (' + storedToken.length + ' 字符)' : '不存在');
            
            if (storedToken) {
                authToken = storedToken; // 更新全局变量
            }
            
            console.log('当前 authToken:', authToken ? '存在 (' + authToken.length + ' 字符)' : '不存在');
            
            if (!authToken) { 
                console.log('authToken 为空，显示未登录状态');
                updateUIForGuest(); 
                return; 
            }
            
            try {
                console.log('发起认证请求...');
                const response = await fetch('/api/auth/me', { 
                    headers: { 'Authorization': 'Bearer ' + authToken },
                    credentials: 'same-origin'
                });
                console.log('认证响应状态:', response.status);
                
                if (response.ok) { 
                    currentUser = await response.json(); 
                    console.log('认证成功，用户:', currentUser.username);
                    updateUIForLoggedIn(); 
                } else { 
                    const errorText = await response.text();
                    console.warn('认证检查失败，状态:', response.status, '错误:', errorText);
                    // 只有在明确的认证失败（401/403）时才切换到未登录状态
                    if (response.status === 401 || response.status === 403) {
                        // token 无效，清除并显示未登录
                        localStorage.removeItem('authToken');
                        authToken = null;
                        updateUIForGuest(); 
                    } else {
                        // 其他错误（如服务器错误），保持已登录状态
                        console.log('非认证错误，保持已登录状态');
                        updateUIForLoggedIn();
                    }
                }
            } catch (error) { 
                console.error('检查登录状态失败:', error); 
                // 网络错误不改变登录状态，保持之前的状态
                console.log('网络错误，保持当前登录状态');
                if (authToken) {
                    updateUIForLoggedIn();
                } else {
                    updateUIForGuest();
                }
            }
        }

        function updateUIForLoggedIn() {
            const footer = document.getElementById('sidebarFooter');
            const avatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            footer.classList.add('logged-in');
            
            // 如果有用户信息，显示用户名，否则显示默认值
            if (currentUser && currentUser.username) {
                avatar.textContent = currentUser.username.charAt(0).toUpperCase();
                userName.textContent = currentUser.username;
            } else {
                // 没有用户信息时显示默认状态（token存在但用户信息未知）
                avatar.textContent = '👤';
                userName.textContent = '用户';
            }
            
            document.getElementById('dropdownLoginItem').style.display = 'none';
            document.getElementById('dropdownLogoutItem').style.display = 'flex';
            document.getElementById('knowledgeBtn').style.display = 'flex';
        }

        function updateUIForGuest() {
            const footer = document.getElementById('sidebarFooter');
            const avatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            footer.classList.remove('logged-in');
            avatar.textContent = '👤'; userName.textContent = '未登录';
            document.getElementById('dropdownLoginItem').style.display = 'flex';
            document.getElementById('dropdownLogoutItem').style.display = 'none';
            document.getElementById('knowledgeBtn').style.display = 'none';
        }

        function goToKnowledge() {
            window.location.href = '/knowledge';
        }

        
        function closeAuthModal() { document.getElementById('authModal').classList.remove('active'); }

        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') { document.querySelectorAll('.auth-tab')[0].classList.add('active'); document.getElementById('loginForm').classList.add('active'); }
            else if (tab === 'register') { document.querySelectorAll('.auth-tab')[1].classList.add('active'); document.getElementById('registerForm').classList.add('active'); }
            else if (tab === 'reset') { document.querySelectorAll('.auth-tab')[2].classList.add('active'); document.getElementById('resetForm').classList.add('active'); }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError'); const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.textContent = '登录中...'; errorDiv.classList.remove('active');
            try {
                const formData = new FormData(); formData.append('username', username); formData.append('password', password);
                const response = await fetch('/api/auth/login', { method: 'POST', body: formData });
                if (response.ok) {
                    const data = await response.json(); authToken = data.access_token; currentUser = data.user;
                    localStorage.setItem('authToken', authToken); closeAuthModal(); updateUIForLoggedIn(); showToast('✅ 登录成功！');
                    document.getElementById('loginForm').reset();
                } else { const error = await response.json(); errorDiv.textContent = error.detail || '登录失败'; errorDiv.classList.add('active'); }
            } catch (error) { errorDiv.textContent = '网络错误，请稍后重试'; errorDiv.classList.add('active'); }
            finally { btn.disabled = false; btn.textContent = '登录'; }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('registerUsername').value;
                        const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const errorDiv = document.getElementById('registerError'); const btn = document.getElementById('registerBtn');
            if (password !== confirmPassword) { errorDiv.textContent = '两次输入的密码不一致'; errorDiv.classList.add('active'); return; }
            if (password.length < 8) { errorDiv.textContent = '密码长度至少8位'; errorDiv.classList.add('active'); return; }
            if (!/[a-zA-Z]/.test(password) || !/[0-9]/.test(password) || !/[^a-zA-Z0-9]/.test(password)) { errorDiv.textContent = '密码必须包含字母+数字+特殊字符'; errorDiv.classList.add("active"); return; }
            btn.disabled = true; btn.textContent = '注册中...'; errorDiv.classList.remove('active');
            try {
                const response = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                if (response.ok) {
                    const data = await response.json(); authToken = data.access_token; currentUser = data.user;
                    localStorage.setItem('authToken', authToken); closeAuthModal(); updateUIForLoggedIn(); showToast('✅ 注册成功！');
                    document.getElementById('registerForm').reset(); document.getElementById('passwordStrengthBar').className = 'password-strength-bar';
                } else { const error = await response.json(); errorDiv.textContent = error.detail || '注册失败'; errorDiv.classList.add('active'); }
            } catch (error) { errorDiv.textContent = '网络错误，请稍后重试'; errorDiv.classList.add('active'); }
            finally { btn.disabled = false; btn.textContent = '注册'; }
        }

        async function handleSendCode(event) {
            if (event) event.preventDefault();
            const username = document.getElementById('resetUsername').value.trim();
            const phone = document.getElementById('resetPhone').value.trim();
            const errorEl = document.getElementById('resetError');
            const btn = document.getElementById('sendCodeBtn');
            if (!username || !phone) { errorEl.textContent = '请先填写用户名和手机号'; return; }
            if (!/^1[3-9]\\d{9}$/.test(phone)) { errorEl.textContent = '手机号格式不正确'; return; }
            try {
                btn.disabled = true; errorEl.textContent = '';
                let original = btn.textContent; btn.textContent = '发送中...';
                const res = await fetch('/api/auth/send-reset-code', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ username: username, phone: phone }) });
                const data = await res.json();
                if (res.ok) {
                    errorEl.textContent = data.message || '验证码已发送（演示环境请查看服务器控制台）';
                    if (data.code) { errorEl.textContent = errorEl.textContent + ' 【测试验证码: ' + data.code + '】'; }
                    let t = 60; const iv = setInterval(()=>{ btn.textContent = t+'秒后重发'; t--; if(t<0){ clearInterval(iv); btn.disabled=false; btn.textContent='获取验证码';} },1000);
                } else { errorEl.textContent = data.detail || data.message || '发送失败'; btn.disabled = false; btn.textContent = '获取验证码'; }
            } catch (e) { errorEl.textContent = '网络错误: ' + e; btn.disabled = false; btn.textContent = '获取验证码'; }
        }

        async function handleResetPassword(event) {
            event.preventDefault();
            const username = document.getElementById('resetUsername').value.trim();
            const phone = document.getElementById('resetPhone').value.trim();
            const code = document.getElementById('resetCode').value.trim();
            const np = document.getElementById('resetNewPassword').value;
            const cp = document.getElementById('resetConfirmPassword').value;
            const errorEl = document.getElementById('resetError');
            if (!username || !phone || !code || !np || !cp) { errorEl.textContent = '请填写完整信息'; return; }
            if (np !== cp) { errorEl.textContent = '两次密码不一致'; return; }
            if (np.length < 8) { errorEl.textContent = '密码长度至少8位'; return; }
            if (!/[a-zA-Z]/.test(np) || !/\\d/.test(np) || !/[^a-zA-Z0-9]/.test(np)) { errorEl.textContent = '密码必须包含字母+数字+特殊字符'; return; }
            try {
                const btn = document.getElementById('resetBtn'); btn.disabled = true;
                let ot = btn.textContent; btn.textContent = '提交中...';
                const res = await fetch('/api/auth/reset-password', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ username: username, phone: phone, code: code, new_password: np, confirm_password: cp }) });
                const data = await res.json();
                if (res.ok) {
                    alert('密码重置成功！请使用新密码登录');
                    switchAuthTab('login');
                    document.getElementById('resetForm').reset();
                    errorEl.textContent = '';
                } else { errorEl.textContent = data.detail || data.message || '重置失败'; }
                btn.disabled = false; btn.textContent = ot;
            } catch (e) { errorEl.textContent = '网络错误: ' + e; }
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === "password") { input.type = "text"; btn.textContent = '🙈'; }
            else { input.type = "password"; btn.textContent = '👁'; }
        }

function checkPasswordStrength(password) {
            const bar = document.getElementById('passwordStrengthBar'); bar.className = 'password-strength-bar';
            if (password.length === 0) { bar.style.width = '0'; return; }
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-zA-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            if (strength <= 1) bar.classList.add('weak'); else if (strength <= 2) bar.classList.add('medium'); else bar.classList.add('strong');
        }

        

        

        function toggleUserMenu(e) {
            e.stopPropagation();
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('show');
        }

        function openSettings() {
            document.getElementById('userDropdown').classList.remove('show');
            document.getElementById('settingsModal').classList.add('active');
        }

        document.addEventListener('click', function() {
            document.getElementById('userDropdown').classList.remove('show');
        });

        function handleLogout() {
            document.getElementById('userDropdown').classList.remove('show');
            if (confirm('确定要退出登录吗？')) { authToken = null; currentUser = null; localStorage.removeItem('authToken'); updateUIForGuest(); showToast('已退出登录'); }
        }

        document.getElementById('authModal').addEventListener('click', function(e) { if (e.target === this) closeAuthModal(); });
        checkAuthStatus();
    </script>
    <!-- 认证模态框 -->
    <div class="auth-modal" id="authModal">
        <div class="auth-container">
            <button class="auth-close" onclick="closeAuthModal()">&times;</button>
            <div class="auth-header">
                <h2>🔐 欢迎使用小智</h2>
                <p>登录以保存对话历史和个性化设置</p>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">登录</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">注册</button>
                <button class="auth-tab" onclick="switchAuthTab('reset')">找回密码</button>
            </div>
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="password-wrapper">
                    <input type="password" id="loginPassword" placeholder="请输入密码" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">👁</button>
                </div>
                </div>
                <div class="auth-error" id="loginError"></div>
                <button type="submit" class="auth-btn" id="loginBtn">登录</button>
                <div style="text-align:center;margin-top:12px"><a href="#" onclick="switchAuthTab('reset');return false" style="color:#667eea;font-size:0.85rem;text-decoration:none">忘记密码？</a></div>
            </form>
            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="registerUsername" placeholder="请输入用户名（3-20个字符）" required autocomplete="username">
                </div>

                
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="registerPhone" placeholder="请输入手机号，用于找回密码" autocomplete="tel">
                </div>
<div class="form-group">
                    <label>密码</label>
                    <div class="password-wrapper">
                    <input type="password" id="registerPassword" placeholder="请输入密码（字母+数字+特殊字符，至少8位）" required autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
                    <button type="button" class="toggle-password" onclick="togglePassword('registerPassword', this)">👁</button>
                </div>
                    <div class="password-strength"><div class="password-strength-bar" id="passwordStrengthBar"></div></div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <div class="password-wrapper">
                    <input type="password" id="registerConfirmPassword" placeholder="请再次输入密码" required autocomplete="new-password">
                    <button type="button" class="toggle-password" onclick="togglePassword('registerConfirmPassword', this)">👁</button>
                </div>
                </div>
                <div class="auth-error" id="registerError"></div>
                <button type="submit" class="auth-btn" id="registerBtn">注册</button>
            </form>
            <form class="auth-form" id="resetForm" onsubmit="handleResetPassword(event)">
                <div class="form-group"><label>用户名</label><input type="text" id="resetUsername" placeholder="请输入注册时的用户名" required></div>
                <div class="form-group"><label>手机号</label><input type="tel" id="resetPhone" placeholder="请输入注册时的手机号" required></div>
                <div class="form-group"><label>验证码</label><div class="password-wrapper"><input type="text" id="resetCode" placeholder="6位验证码" required><button type="button" class="send-code-btn" id="sendCodeBtn" onclick="handleSendCode(event)">获取验证码</button></div></div>
                <div class="form-group"><label>新密码</label><div class="password-wrapper"><input type="password" id="resetNewPassword" placeholder="字母+数字+特殊字符，至少8位" required autocomplete="new-password"><button type="button" class="toggle-password" onclick="togglePassword('resetNewPassword', this)">👁</button></div></div>
                <div class="form-group"><label>确认密码</label><div class="password-wrapper"><input type="password" id="resetConfirmPassword" placeholder="请再次输入新密码" required autocomplete="new-password"><button type="button" class="toggle-password" onclick="togglePassword('resetConfirmPassword', this)">👁</button></div></div>
                <div class="auth-error" id="resetError"></div>
                <button type="submit" class="auth-btn" id="resetBtn">重置密码</button>
            </form>
        </div>
    </div>
    </body>
</html>
